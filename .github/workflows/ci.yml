name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler mold clang \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libglib2.0-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
      - name: Lint
        env:
          PROTOC: /usr/bin/protoc
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
        run: cargo clippy --workspace --features aetherd/dashboard -- -D warnings

  test:
    name: test-${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - aether-core
          - aether-config
          - aether-document
          - aether-graph-algo
          - aether-store
          - aether-memory
          - aether-analysis
          - aether-dashboard
          - aether-query
          - aether-mcp
          - aether-infer
          - aether-parse
          - aether-sir
          - aether-lsp
          - aetherd
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler mold clang
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.crate }}
      - name: Test
        env:
          PROTOC: /usr/bin/protoc
          CARGO_BUILD_JOBS: "2"
        run: cargo test -p ${{ matrix.crate }}

  test-desktop:
    name: test-aether-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler mold clang \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libglib2.0-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: aether-desktop
      - name: Test
        env:
          PROTOC: /usr/bin/protoc
          CARGO_BUILD_JOBS: "2"
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
        run: cargo test -p aether-desktop

  test-aetherd-dashboard:
    name: test-aetherd-dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler mold clang
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: aetherd-dashboard
      - name: Test aetherd with dashboard feature
        env:
          PROTOC: /usr/bin/protoc
          CARGO_BUILD_JOBS: "2"
        run: cargo test -p aetherd --features dashboard
