name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.10.0)"
        required: true

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler mold clang \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libglib2.0-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install protobuf (macOS)
        if: matrix.os == 'macos-13'
        run: brew install protobuf

      - name: Install protobuf (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install protoc -y

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build and package desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROTOC: protoc
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/aether-desktop
          tagName: ${{ inputs.tag }}
          releaseName: "AETHER Desktop ${{ inputs.tag }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          includeUpdaterJson: true
