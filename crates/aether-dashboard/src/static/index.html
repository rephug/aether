<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AETHER Dashboard</title>

  <script>
    if (localStorage.theme === 'dark' || (!localStorage.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: {
              '0': '#f7f7f4',
              '1': '#ffffff',
              '2': '#eef0ea',
              '3': '#d7dbd0',
              '4': '#c7ccb9',
            },
            text: {
              primary: '#1b1e16',
              secondary: '#485041',
              muted: '#6f7769',
            },
            accent: {
              cyan: '#0ea5a8',
              orange: '#ea7d28',
              green: '#1b9a59',
              red: '#c94a34',
              purple: '#5e6db3',
              yellow: '#b7871d'
            }
          }
        }
      }
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/2.0.4/htmx.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tippy.js/6.3.7/tippy.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tippy.js/6.3.7/tippy-bundle.umd.min.js"></script>

  <link rel="stylesheet" href="/dashboard/static/style.css" />
  <link rel="stylesheet" href="/dashboard/static/css/aether-dashboard.css" />

  <script src="/dashboard/static/js/aether-theme.js" defer></script>
  <script src="/dashboard/static/js/aether-tooltip.js" defer></script>
  <script src="/dashboard/static/js/aether-responsive.js" defer></script>
  <script src="/dashboard/static/js/aether-animate.js" defer></script>

  <script src="/dashboard/static/charts.js" defer></script>
  <script src="/dashboard/static/js/charts/xray-cards.js" defer></script>
  <script src="/dashboard/static/js/charts/xray-hotspots.js" defer></script>
  <script src="/dashboard/static/js/charts/symbol-search.js" defer></script>
  <script src="/dashboard/static/js/charts/anatomy.js" defer></script>
  <script src="/dashboard/static/js/charts/blast-radius.js" defer></script>
  <script src="/dashboard/static/js/charts/architecture.js" defer></script>
  <script src="/dashboard/static/js/charts/time-machine.js" defer></script>
  <script src="/dashboard/static/js/charts/causal-explorer.js" defer></script>
  <script src="/dashboard/static/js/charts/smart-search.js" defer></script>
</head>

<body class="h-full complexity-beginner bg-gradient-to-br from-surface-0 via-surface-1 to-surface-2 text-text-primary dark:bg-slate-950 dark:text-slate-100">
  <div class="flex h-full">
    <aside id="sidebar" class="sidebar-open flex w-64 min-h-full flex-col border-r border-surface-3/50 bg-surface-1/85 dark:bg-slate-900/90 dark:border-slate-700">
      <div class="px-4 py-4 border-b border-surface-3/50 dark:border-slate-700">
        <div class="text-sm font-semibold tracking-wide">AETHER Dashboard</div>
      </div>

      <nav class="flex-1 overflow-y-auto p-2 space-y-0.5">
        <a href="#" class="nav-link active" hx-get="/dashboard/frag/anatomy" hx-target="#main-content" hx-push-url="/dashboard/anatomy" onclick="setActiveNav(this)"><span class="sidebar-label">📖 Anatomy</span></a>
        <a href="#" class="nav-link" hx-get="/dashboard/frag/overview" hx-target="#main-content" hx-push-url="/dashboard/overview" onclick="setActiveNav(this)"><span class="sidebar-label">Overview</span></a>
        <a href="#" class="nav-link" hx-get="/dashboard/frag/xray" hx-target="#main-content" hx-push-url="/dashboard/xray" onclick="setActiveNav(this)"><span class="sidebar-label">X-Ray</span></a>
        <a href="#" class="nav-link" hx-get="/dashboard/frag/search" hx-target="#main-content" hx-push-url="/dashboard/search" onclick="setActiveNav(this)"><span class="sidebar-label">Search</span></a>

        <div class="my-2 border-t border-surface-3/40 dark:border-slate-700"></div>

        <a href="#" class="nav-link" hx-get="/dashboard/frag/blast-radius" hx-target="#main-content" hx-push-url="/dashboard/blast-radius" onclick="setActiveNav(this)"><span class="sidebar-label">Blast Radius</span></a>
        <a href="#" class="nav-link" hx-get="/dashboard/frag/architecture" hx-target="#main-content" hx-push-url="/dashboard/architecture" onclick="setActiveNav(this)"><span class="sidebar-label">Architecture Map</span></a>
        <a href="#" class="nav-link" hx-get="/dashboard/frag/time-machine" hx-target="#main-content" hx-push-url="/dashboard/time-machine" onclick="setActiveNav(this)"><span class="sidebar-label">Time Machine</span></a>
        <a href="#" class="nav-link" hx-get="/dashboard/frag/causal" hx-target="#main-content" hx-push-url="/dashboard/causal" onclick="setActiveNav(this)"><span class="sidebar-label">Causal Explorer</span></a>

        <div class="my-2 border-t border-surface-3/40 dark:border-slate-700"></div>

        <a href="#" class="nav-link" hx-get="/dashboard/frag/graph" hx-target="#main-content" hx-push-url="/dashboard/graph" onclick="setActiveNav(this)"><span class="sidebar-label">Dependency Graph</span></a>
        <a href="#" class="nav-link" hx-get="/dashboard/frag/drift-table" hx-target="#main-content" hx-push-url="/dashboard/drift" onclick="setActiveNav(this)"><span class="sidebar-label">Drift Report</span></a>
        <a href="#" class="nav-link" hx-get="/dashboard/frag/coupling" hx-target="#main-content" hx-push-url="/dashboard/coupling" onclick="setActiveNav(this)"><span class="sidebar-label">Coupling Map</span></a>
      </nav>

      <div class="px-3 py-3 border-t border-surface-3/40 dark:border-slate-700 space-y-2">
        <div class="rounded-md border border-surface-3/50 p-2 space-y-1.5 text-xs">
          <div class="font-semibold text-text-secondary">Complexity</div>
          <label class="complexity-option">
            <input type="radio" name="aether-complexity" value="beginner" />
            <span>🟢 I'm new here</span>
          </label>
          <label class="complexity-option">
            <input type="radio" name="aether-complexity" value="intermediate" />
            <span>🟡 I know some code</span>
          </label>
          <label class="complexity-option">
            <input type="radio" name="aether-complexity" value="expert" />
            <span>🔴 Show me the data</span>
          </label>
        </div>
        <button id="theme-toggle" class="w-full px-2 py-2 rounded-md border border-surface-3/50 hover:bg-surface-3/30 text-xs flex items-center justify-between" onclick="toggleTheme()">
          <span>Theme</span>
          <span id="theme-icon">☀</span>
        </button>
        <div class="text-[10px] text-text-muted dark:text-slate-400 font-mono">AETHER v0.X.Y</div>
      </div>
    </aside>

    <div class="flex-1 min-h-full overflow-hidden flex flex-col">
      <header class="px-5 py-3 border-b border-surface-3/50 dark:border-slate-700 bg-surface-1/70 dark:bg-slate-900/80 flex items-center justify-between">
        <h1 id="page-title" class="text-sm font-semibold">📖 Anatomy</h1>
        <div class="text-xs text-text-muted dark:text-slate-400 font-mono" id="header-indexed">—</div>
      </header>

      <div class="flex-1 overflow-y-auto">
        <main id="main-content" class="p-5 lg:p-6" hx-get="/dashboard/frag/anatomy" hx-trigger="load" hx-target="this">
          <div class="flex items-center justify-center h-64"><div class="loading-spinner"></div></div>
        </main>
      </div>
    </div>

    <div id="detail-panel" class="detail-panel hidden fixed right-0 top-0 h-full w-96 bg-surface-1 dark:bg-slate-900 border-l border-surface-3/50 dark:border-slate-700 shadow-2xl z-40 overflow-y-auto"></div>
    <div id="detail-overlay" class="hidden fixed inset-0 bg-black/30 z-30" onclick="closeDetailPanel()"></div>
  </div>

  <script>
    const COMPLEXITY_KEY = 'aether-complexity';

    function setActiveNav(el) {
      document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
      el.classList.add('active');
      const label = el.querySelector('.sidebar-label');
      if (label) document.getElementById('page-title').textContent = label.textContent.trim();
    }

    function openDetailPanel() {
      document.getElementById('detail-panel').classList.remove('hidden');
      document.getElementById('detail-overlay').classList.remove('hidden');
    }

    function closeDetailPanel() {
      document.getElementById('detail-panel').classList.add('hidden');
      document.getElementById('detail-overlay').classList.add('hidden');
      document.getElementById('detail-panel').innerHTML = '';
    }

    function toggleTheme() {
      if (window.AetherTheme && window.AetherTheme.toggleTheme) {
        window.AetherTheme.toggleTheme();
        updateThemeIcon();
      }
    }

    function updateThemeIcon() {
      const icon = document.getElementById('theme-icon');
      if (!icon || !window.AetherTheme) return;
      icon.textContent = window.AetherTheme.isDark() ? '🌙' : '☀';
    }

    function initTippyTooltips(scope) {
      if (!window.tippy) return;
      const root = scope || document;
      const items = root.querySelectorAll ? root.querySelectorAll('[data-tippy-content]') : [];
      items.forEach((el) => {
        if (el._tippy) {
          if (document.body.classList.contains('complexity-expert')) {
            el._tippy.disable();
          } else {
            el._tippy.enable();
          }
          return;
        }
        window.tippy(el, {
          allowHTML: false,
          placement: 'top',
          delay: [120, 50],
          maxWidth: 320,
        });
      });
    }

    function applyComplexityMode(mode) {
      const chosen = ['beginner', 'intermediate', 'expert'].includes(mode) ? mode : 'beginner';
      const body = document.body;
      body.classList.remove('complexity-beginner', 'complexity-intermediate', 'complexity-expert');
      body.classList.add(`complexity-${chosen}`);
      localStorage.setItem(COMPLEXITY_KEY, chosen);

      document.querySelectorAll('input[name="aether-complexity"]').forEach((input) => {
        input.checked = input.value === chosen;
      });

      initTippyTooltips(document);
    }

    function initComplexitySelector() {
      const stored = localStorage.getItem(COMPLEXITY_KEY) || 'beginner';
      applyComplexityMode(stored);

      document.querySelectorAll('input[name="aether-complexity"]').forEach((input) => {
        if (input.dataset.bound === '1') return;
        input.dataset.bound = '1';
        input.addEventListener('change', (event) => {
          applyComplexityMode(event.target.value);
        });
      });
    }

    function initPageModules() {
      if (window.initOverviewCharts && document.getElementById('overview-chart')) window.initOverviewCharts();
      if (window.initAnatomyGraph && document.getElementById('anatomy-layer-graph')) window.initAnatomyGraph();
      if (window.initGraph && document.getElementById('graph-container')) window.initGraph();
      if (window.initDriftChart && document.getElementById('drift-chart')) window.initDriftChart();
      if (window.initHeatmap && document.getElementById('heatmap-container')) window.initHeatmap();
      if (window.initHealthChart && document.getElementById('health-chart')) window.initHealthChart();

      if (window.initXrayCards && document.getElementById('xray-metrics-grid')) window.initXrayCards();
      if (window.initXrayHotspots && document.getElementById('xray-hotspots-body')) window.initXrayHotspots();
      if (window.initBlastRadius && document.getElementById('blast-radius-chart')) window.initBlastRadius();
      if (window.initArchitectureMap && document.getElementById('architecture-treemap')) window.initArchitectureMap();
      if (window.initTimeMachine && document.getElementById('time-machine-graph')) window.initTimeMachine();
      if (window.initCausalExplorer && document.getElementById('causal-graph')) window.initCausalExplorer();
      if (window.initSmartSearch && document.getElementById('smart-search-results')) window.initSmartSearch();
    }

    document.body.addEventListener('htmx:afterSwap', function(evt) {
      if (evt.detail.target.id === 'main-content') {
        requestAnimationFrame(() => {
          initPageModules();
          initComplexitySelector();
          initTippyTooltips(evt.detail.target);
        });
      }
      if (evt.detail.target.id === 'detail-panel') {
        openDetailPanel();
        initTippyTooltips(evt.detail.target);
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeDetailPanel();
    });

    window.addEventListener('load', function() {
      updateThemeIcon();
      initComplexitySelector();
      initTippyTooltips(document);
    });
  </script>
</body>
</html>
